<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 118" width="620" height="590">
  <title>Símbolo v2: pin de crecimiento con ondas de visibilidad</title>
  <!-- Base / sombra de mapa -->
  <ellipse cx="52" cy="106" rx="17" ry="4.5" fill="#D8E5E1"/>
  <!-- Pin de mapa -->
  <path fill="#0B5D4E"
    d="M52,102 C52,102 20,68 20,50 A32,32 0 1 1 84,50 C84,68 52,102 52,102 Z"/>
  <!-- Flecha de crecimiento (acento ámbar) -->
  <path fill="#F2B349"
    d="M52,33 L69,54 L59,54 L59,67 L45,67 L45,54 L35,54 Z"/>
  <!-- Ondas de señal / visibilidad -->
  <g stroke="#3E8E7E" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M76,17 A9,9 0 0 1 85,26"/>
    <path d="M76,10 A16,16 0 0 1 92,26"/>
    <path d="M76,3 A23,23 0 0 1 99,26"/>
  </g>
</svg>
